<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Estudiantil - Mérida</title>
    
    <link rel="icon" type="image/png" href="icono-512.png" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004a99">
    <link rel="apple-touch-icon" href="icono-512.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="css/estilos.css?v=6.0" />
</head>
<body>
    <div class="controles-mapa">
        <h2 class="titulo-mapa">🎓 Mapa Estudiantil</h2>
        
        <div class="input-grupo">
            <input type="text" id="buscador" placeholder="🔍 Buscar facultad o escuela...">
        </div>
        
        <div class="botones-grupo">
            <button id="btn-ubicacion" class="btn-primario">📍 ¿Dónde estoy?</button>
            <button id="btn-tema" class="btn-secundario">🌙 Oscuro</button>
        </div>

        <div class="selector-rutas">
            <p>🚌 Ver recorrido completo:</p>
            <label><input type="checkbox" value="72"> Ruta 72</label>
            <label><input type="checkbox" value="Periferico"> Ruta Va-y-Ven Periférico</label>
            <label><input type="checkbox" value="92"> Ruta 92</label>
        </div>
    </div>

    <div id="cargando">
        <div class="spinner"></div>
        <span>Cargando rutas y escuelas...</span>
    </div>
    
    <div id="mapa-merida"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module" src="js/main.js?v=6.0"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ Service Worker registrado con éxito.', reg))
                    .catch(err => console.error('❌ Error al registrar el Service Worker', err));
            });
        }
    </script>
</body>
</html>
