<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Estudiantil - Mérida</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <link rel="stylesheet" href="css/estilos.css?v=2.0" />
</head>
<body>
    <div class="controles-mapa">
        <h2>Mapa Estudiantil</h2>
        <input type="text" id="buscador" placeholder="🔍 Buscar escuela...">
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="btn-ubicacion" style="flex: 1;">📍 ¿Dónde estoy?</button>
            <button id="btn-tema" style="flex: 1;">🌙 Oscuro</button>
        </div>
    </div>

    <div id="cargando">Cargando datos...</div>
    <div id="mapa-merida"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script type="module" src="js/main.js?v=2.0"></script>
</body>
</html>
