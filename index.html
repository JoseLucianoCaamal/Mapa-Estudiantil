<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Estudiantil - Mérida</title>
    
    <link rel="icon" type="image/png" href="/Img/icono-512.png" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004a99">
    <link rel="apple-touch-icon" href="icono-512.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="css/estilos.css?v=7.0" />
</head>
<body>
    <div class="controles-mapa">
        <h2 class="titulo-mapa">🎓 Mapa Estudiantil</h2>
        
        <div class="input-grupo">
            <input type="text" id="buscador" placeholder="🔍 Buscar facultad o escuela...">
        </div>
        
        <div class="botones-grupo">
            <button id="btn-ubicacion" class="btn-primario">📍 ¿Dónde estoy?</button>
            <button id="btn-tema" class="btn-secundario">🌙 Oscuro</button>
        </div>
        
        <div id="filtros" style="background: white; padding: 10px; z-index: 1000; position: relative;">
            <label><input type="checkbox" id="check-universidades" checked> Universidades</label>
            <label><input type="checkbox" id="check-supers" checked> Supers</label>
            <label><input type="checkbox" id="check-salud" checked> Área de Salud</label>
            </div>
    </div>

    <div id="cargando">
        <div class="spinner"></div>
        <span>Cargando rutas y escuelas...</span>
    </div>
    
    <div id="mapa-merida"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module" src="js/main.js?v=7.0"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ Service Worker registrado con éxito.', reg))
                    .catch(err => console.error('❌ Error al registrar el Service Worker', err));
            });
        }
    </script>
</body>
</html>
