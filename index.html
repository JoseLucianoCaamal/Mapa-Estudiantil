<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Estudiantil - Mérida</title>
    
    <link rel="icon" type="image/png" href="./Img/icono-512.png" />
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#004a99">
    <link rel="apple-touch-icon" href="./Img/icono-512.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="css/estilos.css?v=7.0" />
</head>
<body>
    <div class="controles-mapa">
        <h2 class="titulo-mapa">🎓 Mapa Estudiantil</h2>
        
        <div class="input-grupo">
            <input type="text" id="buscador" placeholder="🔍 Buscar facultad o escuela...">
        </div>
        
        <div class="botones-grupo">
            <button id="btn-ubicacion" class="btn-primario">📍 ¿Dónde estoy?</button>
            <button id="btn-tema" class="btn-secundario">🌙 Oscuro</button>
        </div>
        
        <div id="filtros" class="contenedor-filtros">
            <div class="switch-container">
                <label class="switch">
                    <input type="checkbox" id="check-uni" checked>
                    <span class="slider"></span>
                </label>
                <span>Universidades</span>
            </div>
            <div class="switch-container">
                <label class="switch">
                    <input type="checkbox" id="check-super" checked>
                    <span class="slider"></span>
                </label>
                <span>Supers</span>
            </div>
            <div class="switch-container">
                <label class="switch">
                    <input type="checkbox" id="check-salud" checked>
                    <span class="slider"></span>
                </label>
                <span>Salud</span>
            </div>
        </div>
    </div>

    <div id="cargando">
        <div class="spinner"></div>
        <span>Cargando rutas y escuelas...</span>
    </div>
    
    <div id="mapa-merida"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module" src="js/main.js?v=7.0"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ Service Worker registrado.', reg))
                    .catch(err => console.error('❌ Error al registrar el Service Worker', err));
            });
        }
    </script>
</body>
</html>
